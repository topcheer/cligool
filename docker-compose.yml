services:
  relay-server:
    image: ghcr.io/topcheer/cligool:latest
    # 如需本地构建，取消注释以下两行并注释掉上面的image行：
    # build:
    #   dockerfile: Dockerfile.multiarch
    container_name: cligool-relay
    ports:
      - "8081:8080"
    environment:
      - RELAY_HOST=0.0.0.0
      - RELAY_PORT=8080
    restart: unless-stopped
    networks:
      - cligool-network
    volumes:
      - ./logs:/app/logs

networks:
  cligool-network:
    driver: bridge
