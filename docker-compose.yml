# 生产环境 Docker Compose 配置
# 使用预构建的镜像（从 GitHub Container Registry）

services:
  relay-server:
    image: ghcr.io/topcheer/cligool:latest
    container_name: cligool-relay
    ports:
      - "8081:8080"
    environment:
      - RELAY_HOST=0.0.0.0
      - RELAY_PORT=8080
    restart: unless-stopped
    networks:
      - cligool-network
    volumes:
      - ./logs:/app/logs

networks:
  cligool-network:
    driver: bridge
