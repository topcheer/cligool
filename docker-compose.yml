version: '3.8'

services:
  relay-server:
    build: .
    container_name: cligool-relay
    ports:
      - "8081:8080"
    environment:
      - DATABASE_URL=postgres://cligool:cligool123@postgres:5432/cligool?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - RELAY_HOST=0.0.0.0
      - RELAY_PORT=8080
      - ENABLE_AUTO_HTTPS=false
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - cligool-network
    volumes:
      - ./logs:/app/logs

  postgres:
    image: postgres:15-alpine
    container_name: cligool-postgres
    environment:
      - POSTGRES_DB=cligool
      - POSTGRES_USER=cligool
      - POSTGRES_PASSWORD=cligool123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - cligool-network

  redis:
    image: redis:7-alpine
    container_name: cligool-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - cligool-network
    command: redis-server --appendonly yes

volumes:
  postgres-data:
  redis-data:

networks:
  cligool-network:
    driver: bridge