[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.multiarch"

[deploy]
startCommand = "./relay-server"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "cligool-relay"
type = "web"

[services.env]
RELAY_HOST = "0.0.0.0"
RELAY_PORT = "8080"
ENABLE_AUTO_HTTPS = "true"
