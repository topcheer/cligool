databases:
  - name: cligool-postgres
    databaseName: cligool
    user: cligool
    plan: free
    region: singapore

services:
  - type: keyvalue
    name: cligool-redis
    plan: free
    region: singapore
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: cligool-relay
    plan: free
    env: docker
    region: singapore
    dockerfilePath: ./Dockerfile.multiarch
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cligool-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cligool-redis
          property: connectionString
      - key: RELAY_HOST
        value: 0.0.0.0
      - key: RELAY_PORT
        value: "8080"
      - key: ENABLE_AUTO_HTTPS
        value: "true"
