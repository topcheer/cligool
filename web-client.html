<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliGool - 远程终端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4d;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2d2d2d;
            padding: 15px 20px;
            border-bottom: 1px solid #3e3e3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4ec9b0;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            background: #3c3c3c;
            border: 1px solid #5a5a5a;
            color: #d4d4d4d;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            width: 200px;
        }

        input[type="text"]:focus {
            border-color: #4ec9b0;
        }

        button {
            background: #4ec9b0;
            color: #1e1e1e;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: #3db8a0;
        }

        button:disabled {
            background: #5a5a5a;
            cursor: not-allowed;
        }

        .disconnect-btn {
            background: #f48771;
            color: #1e1e1e;
        }

        .disconnect-btn:hover {
            background: #e37660;
        }

        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status.disconnected {
            background: #f48771;
            color: #1e1e1e;
        }

        .status.connecting {
            background: #dcdcaa;
            color: #1e1e1e;
        }

        .status.connected {
            background: #4ec9b0;
            color: #1e1e1e;
        }

        .terminal-container {
            flex: 1;
            padding: 20px;
            overflow: hidden;
        }

        #terminal {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
        }

        .footer {
            background: #2d2d2d;
            padding: 10px 20px;
            border-top: 1px solid #3e3e3e;
            font-size: 12px;
            color: #8a8a8a;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">CliGool - 远程终端</div>
        <div class="controls">
            <span class="status disconnected" id="connection-status">未连接</span>
            <input type="text" id="server-url" placeholder="中继服务器地址" value="wss://cligool.zty8.cn">
            <input type="text" id="session-id" placeholder="会话ID">
            <button id="connect-btn">连接</button>
            <button id="disconnect-btn" class="disconnect-btn" style="display: none;">断开</button>
        </div>
    </div>

    <div class="terminal-container">
        <div id="terminal"></div>
    </div>

    <div class="footer">
        <div class="shortcuts">
            <div class="shortcut-item">
                <kbd>Ctrl</kbd> + <kbd>C</kbd> 复制
            </div>
            <div class="shortcut-item">
                <kbd>Ctrl</kbd> + <kbd>V</kbd> 粘贴
            </div>
        </div>
        <div class="info">
            将此HTML文件保存到本地并在浏览器中打开使用
        </div>
    </div>

    <!-- 使用CDN加载xterm.js -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-webgl@0.16.0/lib/xterm-addon-webgl.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">

    <script>
        // 全局变量
        let terminal = null;
        let fitAddon = null;
        let ws = null;
        let currentSessionId = null;
        let currentServerUrl = null;

        // 初始化终端
        function initTerminal() {
            terminal = new xterm.Terminal({
                cursorBlink: true,
                fontSize: 14,
                fontFamily: 'Menlo, "Monaco", "Courier New", monospace',
                theme: {
                    background: '#1e1e1e',
                    foreground: '#d4d4d4d',
                    cursor: '#4ec9b0',
                    black: '#000000',
                    red: '#cd3131',
                    green: '#0dbc79',
                    yellow: '#e5e510',
                    blue: '#2472c8',
                    magenta: '#bc3fbc',
                    cyan: '#11a8cd',
                    white: '#e5e5e5',
                },
                scrollback: 1000,
                tabStopWidth: 4,
            });

            // 加载插件
            fitAddon = new FitAddon.FitAddon();
            terminal.loadAddon(fitAddon);

            webglAddon = new WebglAddon.WebglAddon();
            terminal.loadAddon(webglAddon);

            // 挂载终端
            terminal.open(document.getElementById('terminal'));
            fitAddon.fit();

            // 监听窗口大小变化
            window.addEventListener('resize', () => {
                fitAddon.fit();
            });

            // 欢迎信息
            terminal.writeln('✨ 欢迎使用 CliGool 远程终端！');
            terminal.writeln('📋 使用步骤：');
            terminal.writeln('   1. 在服务器机器上启动CLI客户端');
            terminal.writeln('   2. 输入会话ID并点击"连接"按钮');
            terminal.writeln('   3. 开始远程控制终端');
            terminal.writeln('');
            terminal.writeln('💡 提示：需要有CLI客户端连接到此会话才能使用');
            terminal.writeln('');
        }

        // 连接到会话
        function connectToSession() {
            const serverUrl = document.getElementById('server-url').value.trim();
            const sessionId = document.getElementById('session-id').value.trim();

            if (!serverUrl) {
                alert('请输入中继服务器地址');
                return;
            }

            if (!sessionId) {
                alert('请输入会话ID');
                return;
            }

            // 构建WebSocket URL
            let wsUrl = serverUrl;
            if (!wsUrl.startsWith('ws://') && !wsUrl.startsWith('wss://')) {
                // 如果只输入域名，自动添加wss://
                wsUrl = 'wss://' + wsUrl;
            }

            // 确保是WebSocket协议
            if (wsUrl.startsWith('https://')) {
                wsUrl = wsUrl.replace('https://', 'wss://');
            } else if (wsUrl.startsWith('http://')) {
                wsUrl = wsUrl.replace('http://', 'ws://');
            }

            // 添加API路径
            wsUrl = `${wsUrl}/api/terminal/${sessionId}?type=web&user_id=web-${Date.now()}`;

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    updateConnectionStatus('connected');
                    terminal.reset();
                    terminal.writeln(`✅ 已连接到会话: ${sessionId}`);
                    terminal.writeln(`🌐 服务器: ${serverUrl}`);
                    terminal.writeln('');
                    terminal.writeln('等待客户端连接...');
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        handleTerminalMessage(msg);
                    } catch (e) {
                        console.error('解析消息失败:', e);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket错误:', error);
                    terminal.writeln('❌ 连接错误');
                };

                ws.onclose = () => {
                    updateConnectionStatus('disconnected');
                    terminal.writeln('');
                    terminal.writeln('❌ 连接已断开');
                };

            } catch (error) {
                console.error('连接失败:', error);
                alert('连接失败: ' + error.message);
            }
        }

        // 处理终端消息
        function handleTerminalMessage(msg) {
            switch (msg.type) {
                case 'output':
                    if (msg.data && msg.data.length > 0) {
                        // 将Base64字符串转换回原始字符串
                        const str = atob(msg.data);
                        terminal.write(str);
                    }
                    break;
                case 'close':
                    terminal.writeln('');
                    terminal.writeln('❌ 会话已关闭');
                    disconnect();
                    break;
                case 'resize':
                    // 处理终端大小变化（暂不实现）
                    break;
            }
        }

        // 断开连接
        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            currentSessionId = null;
            currentServerUrl = null;
            updateConnectionStatus('disconnected');
        }

        // 更新连接状态
        function updateConnectionStatus(status) {
            const statusEl = document.getElementById('connection-status');
            const connectBtn = document.getElementById('connect-btn');
            const disconnectBtn = document.getElementById('disconnect-btn');
            const serverUrlInput = document.getElementById('server-url');
            const sessionIdInput = document.getElementById('session-id');

            statusEl.className = 'status ' + status;

            switch (status) {
                case 'connected':
                    statusEl.textContent = '已连接';
                    connectBtn.style.display = 'none';
                    disconnectBtn.style.display = 'block';
                    serverUrlInput.disabled = true;
                    sessionIdInput.disabled = true;
                    break;
                case 'connecting':
                    statusEl.textContent = '连接中...';
                    connectBtn.disabled = true;
                    break;
                case 'disconnected':
                    statusEl.textContent = '未连接';
                    connectBtn.style.display = 'block';
                    disconnectBtn.style.display = 'none';
                    connectBtn.disabled = false;
                    serverUrlInput.disabled = false;
                    sessionIdInput.disabled = false;
                    break;
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTerminal();

            // 连接按钮事件
            document.getElementById('connect-btn').addEventListener('click', connectToSession);

            // 断开按钮事件
            document.getElementById('disconnect-btn').addEventListener('click', disconnect);

            // 回车键连接
            document.getElementById('session-id').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    connectToSession();
                }
            });

            // 终端输入处理
            terminal.onData(data => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    // 将字符串转换为字节数组，然后转换为Base64
                    const dataBytes = new TextEncoder().encode(data);
                    const base64Data = btoa(String.fromCharCode.apply(null, dataBytes));
                    ws.send(JSON.stringify({
                        type: 'input',
                        data: base64Data,
                        session: currentSessionId
                    }));
                }
            });

            // 终端大小变化处理
            terminal.onResize(({ cols, rows }) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'resize',
                        cols: cols,
                        rows: rows,
                        session: currentSessionId
                    }));
                }
            });
        });
    </script>
</body>
</html>
