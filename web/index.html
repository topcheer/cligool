<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliGool - 远程终端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: #2d2d2d;
            padding: 15px 20px;
            border-bottom: 1px solid #3e3e3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4ec9b0;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        input[type="text"] {
            background: #3c3c3c;
            border: 1px solid #5a5a5a;
            color: #d4d4d4;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #4ec9b0;
        }

        button {
            background: #4ec9b0;
            color: #1e1e1e;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: #3db8a0;
        }

        button:disabled {
            background: #5a5a5a;
            cursor: not-allowed;
        }

        .disconnect-btn {
            background: #f48771;
            color: #1e1e1e;
        }

        .disconnect-btn:hover {
            background: #e37660;
        }

        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status.connected {
            background: #4ec9b0;
            color: #1e1e1e;
        }

        .status.disconnected {
            background: #f48771;
            color: #1e1e1e;
        }

        .status.connecting {
            background: #dcdcaa;
            color: #1e1e1e;
        }

        .terminal-container {
            flex: 1;
            padding: 20px;
            overflow: hidden;
        }

        #terminal {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
        }

        .footer {
            background: #2d2d2d;
            padding: 10px 20px;
            border-top: 1px solid #3e3e3e;
            font-size: 12px;
            color: #8a8a8a;
            display: flex;
            justify-content: space-between;
        }

        .shortcuts {
            display: flex;
            gap: 20px;
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        kbd {
            background: #3c3c3c;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            border: 1px solid #5a5a5a;
        }

        .connection-info {
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">CliGool</div>
            <div class="controls">
                <div class="control-group">
                    <span class="status disconnected" id="connection-status">未连接</span>
                </div>
                <div class="control-group">
                    <input type="text" id="session-id" placeholder="会话ID" value="">
                    <button id="connect-btn">连接</button>
                    <button id="disconnect-btn" class="disconnect-btn" style="display: none;">断开</button>
                </div>
            </div>
        </div>

        <div class="terminal-container">
            <div id="terminal"></div>
        </div>

        <div class="footer">
            <div class="shortcuts">
                <div class="shortcut-item">
                    <kbd>Ctrl</kbd> + <kbd>C</kbd> 复制
                </div>
                <div class="shortcut-item">
                    <kbd>Ctrl</kbd> + <kbd>V</kbd> 粘贴
                </div>
                <div class="shortcut-item">
                    <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>F</kbd> 查找
                </div>
            </div>
            <div class="connection-info">
                <span id="connection-info">未连接到任何会话</span>
            </div>
        </div>
    </div>

    <!-- 使用CDN加载xterm.js -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-webgl@0.16.0/lib/xterm-addon-webgl.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">

    <script>
        // 全局变量
        let terminal = null;
        let fitAddon = null;
        let webglAddon = null;
        let ws = null;
        let currentSessionId = null;

        // 初始化终端
        function initTerminal() {
            // 创建终端实例
            terminal = new Terminal({
                cursorBlink: true,
                fontSize: 14,
                fontFamily: 'Consolas, "Courier New", monospace',
                theme: {
                    background: '#1e1e1e',
                    foreground: '#d4d4d4',
                    cursor: '#4ec9b0',
                    black: '#000000',
                    red: '#cd3131',
                    green: '#0dbc79',
                    yellow: '#e5e510',
                    blue: '#2472c8',
                    magenta: '#bc3fbc',
                    cyan: '#11a8cd',
                    white: '#e5e5e5',
                    brightBlack: '#666666',
                    brightRed: '#f14c4c',
                    brightGreen: '#23d18b',
                    brightYellow: '#f5f543',
                    brightBlue: '#3b8eea',
                    brightMagenta: '#d670d6',
                    brightCyan: '#29b8db',
                    brightWhite: '#ffffff',
                },
                scrollback: 1000,
                tabStopWidth: 4,
            });

            // 加载插件
            fitAddon = new FitAddon.FitAddon();
            terminal.loadAddon(fitAddon);

            webglAddon = new WebglAddon.WebglAddon();
            terminal.loadAddon(webglAddon);

            // 挂载终端
            terminal.open(document.getElementById('terminal'));
            fitAddon.fit();

            // 监听窗口大小变化
            window.addEventListener('resize', () => {
                fitAddon.fit();
            });

            // 监听终端输入
            terminal.onData(data => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'input',
                        data: new TextEncoder().encode(data),
                        session: currentSessionId
                    }));
                }
            });

            // 监听终端大小变化
            terminal.onResize(({ cols, rows }) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'resize',
                        cols: cols,
                        rows: rows,
                        session: currentSessionId
                    }));
                }
            });

            // 欢迎信息
            terminal.writeln('欢迎使用 CliGool 远程终端！');
            terminal.writeln('请输入会话ID并点击"连接"按钮开始使用。');
            terminal.writeln('');
        }

        // 连接到会话
        function connectToSession(sessionId) {
            if (!sessionId) {
                alert('请输入会话ID');
                return;
            }

            currentSessionId = sessionId;
            updateConnectionStatus('connecting');

            // 构建WebSocket URL
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/terminal/${sessionId}?type=web&user_id=${generateUserId()}`;

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    updateConnectionStatus('connected');
                    terminal.reset();
                    terminal.writeln(`已连接到会话: ${sessionId}`);
                    terminal.writeln('');
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        handleTerminalMessage(msg);
                    } catch (e) {
                        console.error('解析消息失败:', e);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket错误:', error);
                    terminal.writeln('连接错误，请检查网络连接');
                };

                ws.onclose = () => {
                    updateConnectionStatus('disconnected');
                    terminal.writeln('');
                    terminal.writeln('连接已断开');
                };

            } catch (error) {
                console.error('连接失败:', error);
                updateConnectionStatus('disconnected');
                alert('连接失败: ' + error.message);
            }
        }

        // 处理终端消息
        function handleTerminalMessage(msg) {
            switch (msg.type) {
                case 'output':
                    if (msg.data && msg.data.length > 0) {
                        const str = new TextDecoder().decode(msg.data);
                        terminal.write(str);
                    }
                    break;
                case 'resize':
                    // 处理终端大小变化
                    break;
                case 'close':
                    terminal.writeln('');
                    terminal.writeln('会话已关闭');
                    disconnect();
                    break;
            }
        }

        // 断开连接
        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            updateConnectionStatus('disconnected');
            currentSessionId = null;
        }

        // 更新连接状态
        function updateConnectionStatus(status) {
            const statusEl = document.getElementById('connection-status');
            const connectBtn = document.getElementById('connect-btn');
            const disconnectBtn = document.getElementById('disconnect-btn');
            const connectionInfo = document.getElementById('connection-info');
            const sessionIdInput = document.getElementById('session-id');

            statusEl.className = 'status ' + status;

            switch (status) {
                case 'connected':
                    statusEl.textContent = '已连接';
                    connectBtn.style.display = 'none';
                    disconnectBtn.style.display = 'block';
                    sessionIdInput.disabled = true;
                    connectionInfo.textContent = `已连接到会话: ${currentSessionId}`;
                    break;
                case 'connecting':
                    statusEl.textContent = '连接中...';
                    connectBtn.disabled = true;
                    connectionInfo.textContent = '正在连接...';
                    break;
                case 'disconnected':
                    statusEl.textContent = '未连接';
                    connectBtn.style.display = 'block';
                    disconnectBtn.style.display = 'none';
                    connectBtn.disabled = false;
                    sessionIdInput.disabled = false;
                    connectionInfo.textContent = '未连接到任何会话';
                    break;
            }
        }

        // 生成用户ID
        function generateUserId() {
            return 'user_' + Math.random().toString(36).substring(2, 15);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTerminal();

            // 连接按钮事件
            document.getElementById('connect-btn').addEventListener('click', () => {
                const sessionId = document.getElementById('session-id').value.trim();
                if (!sessionId) {
                    // 生成随机会话ID
                    const randomSessionId = 'session_' + Math.random().toString(36).substring(2, 15);
                    document.getElementById('session-id').value = randomSessionId;
                    connectToSession(randomSessionId);
                } else {
                    connectToSession(sessionId);
                }
            });

            // 断开按钮事件
            document.getElementById('disconnect-btn').addEventListener('click', disconnect);

            // 会话ID输入框回车事件
            document.getElementById('session-id').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('connect-btn').click();
                }
            });

            // 从URL获取会话ID
            const urlParams = new URLSearchParams(window.location.search);
            const sessionParam = urlParams.get('session');
            if (sessionParam) {
                document.getElementById('session-id').value = sessionParam;
                connectToSession(sessionParam);
            }
        });
    </script>
</body>
</html>
