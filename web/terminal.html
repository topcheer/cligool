<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliGool - 远程终端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2d2d2d;
            padding: 15px 20px;
            border-bottom: 1px solid #3e3e3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4ec9b0;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            background: #4ec9b0;
            color: #1e1e1e;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: #3db8a0;
        }

        .disconnect-btn {
            background: #f48771;
            color: #1e1e1e;
        }

        .disconnect-btn:hover {
            background: #e37660;
        }

        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status.disconnected {
            background: #f48771;
            color: #1e1e1e;
        }

        .status.connecting {
            background: #dcdcaa;
            color: #1e1e1e;
        }

        .status.connected {
            background: #4ec9b0;
            color: #1e1e1e;
        }

        .session-info {
            color: #8a8a8a;
            font-size: 12px;
        }

        .terminal-container {
            flex: 1;
            padding: 20px;
            overflow: hidden;
        }

        #terminal {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
        }

        .footer {
            background: #2d2d2d;
            padding: 10px 20px;
            border-top: 1px solid #3e3e3e;
            font-size: 12px;
            color: #8a8a8a;
            display: flex;
            justify-content: space-between;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* 隐藏页头和页脚的样式 */
        .header.hidden,
        .footer.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-20px);
        }

        .footer.hidden {
            transform: translateY(20px);
        }

        /* 隐藏页头时，终端容器占据全部空间 */
        body.has-connected .header,
        body.has-connected .footer {
            display: none;
        }

        body.has-connected .terminal-container {
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">CliGool - 远程终端</div>
        <div class="controls">
            <span class="status disconnected" id="connection-status">未连接</span>
            <span class="session-info" id="session-info">正在加载...</span>
            <button id="disconnect-btn" class="disconnect-btn" style="display: none;">断开</button>
        </div>
    </div>

    <div class="terminal-container">
        <div id="terminal"></div>
    </div>

    <div class="footer">
        <div class="shortcuts">
            <div class="shortcut-item">
                <kbd>Ctrl</kbd> + <kbd>C</kbd> 复制
            </div>
            <div class="shortcut-item">
                <kbd>Ctrl</kbd> + <kbd>V</kbd> 粘贴
            </div>
        </div>
        <div class="info">
            CliGool 远程终端
        </div>
    </div>

    <!-- 使用本地托管的xterm.js -->
    <link rel="stylesheet" href="/lib/xterm.css?v=5.3.0">
    <script src="/lib/xterm.js?v=5.3.0"></script>
    <script src="/lib/xterm-addon-fit.js?v=5.3.0"></script>
    <script src="/lib/xterm-addon-webgl.js?v=5.3.0"></script>

    <script>
        // 全局变量
        let terminal = null;
        let fitAddon = null;
        let webglAddon = null;
        let ws = null;
        let clientOS = 'unknown'; // 客户端操作系统类型
        let hasReceivedFirstMessage = false; // 是否已接收过第一个WebSocket消息

        // 从URL获取会话ID
        const pathParts = window.location.pathname.split('/');
        const sessionId = pathParts[pathParts.length - 1];

        // 构建服务器URL
        const serverUrl = window.location.protocol === 'https:' ? 'wss://' + window.location.host : 'ws://' + window.location.host;

        // 更新会话信息显示
        document.getElementById('session-info').textContent = '会话: ' + sessionId;

        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            // 检查Terminal是否加载成功
            if (typeof Terminal === 'undefined') {
                document.getElementById('terminal').innerHTML = '<div style="color:white;padding:20px;"><h1>❌ 加载失败</h1><p>xterm.js库未能加载，请检查网络连接或刷新页面</p></div>';
                return;
            }

            try {
                // 初始化终端
                initTerminal();

                // 设置断开按钮事件
                document.getElementById('disconnect-btn').addEventListener('click', disconnect);

                // 自动连接WebSocket
                setTimeout(connectWebSocket, 1000);

            } catch (e) {
                console.error('初始化失败:', e);
                document.getElementById('terminal').innerHTML = '<div style="color:white;padding:20px;"><h1>❌ 初始化失败</h1><p>' + e.message + '</p></div>';
            }
        });

        function initTerminal() {
            terminal = new Terminal({
                cursorBlink: true,
                fontSize: 14,
                fontFamily: 'Menlo, "Monaco", "Courier New", monospace',
                theme: {
                    background: '#1e1e1e',
                    foreground: '#d4d4d4',
                    cursor: '#4ec9b0',
                    black: '#000000',
                    red: '#cd3131',
                    green: '#0dbc79',
                    yellow: '#e5e510',
                    blue: '#2472c8',
                    magenta: '#bc3fbc',
                    cyan: '#11a8cd',
                    white: '#e5e5e5',
                },
                scrollback: 1000,
                tabStopWidth: 4,
                // 启用高级终端特性
                allowProposedApi: true,  // 允许使用实验性 API
                convertEol: true,         // 自动转换换行符
                // 终端选项
                altClickMovesCursor: true, // Alt+点击移动光标
            });

            // 加载插件
            fitAddon = new FitAddon.FitAddon();
            terminal.loadAddon(fitAddon);

            webglAddon = new WebglAddon.WebglAddon();
            terminal.loadAddon(webglAddon);

            // 挂载终端
            terminal.open(document.getElementById('terminal'));
            fitAddon.fit();

            // 监听窗口大小变化
            window.addEventListener('resize', () => {
                fitAddon.fit();
            });

            // 注意：不在这里显示欢迎信息，避免闪烁
            // 等待WebSocket连接并接收消息后再显示内容

            // 终端输入处理
            terminal.onData(data => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    // 使用更高效的发送方式
                    ws.send(JSON.stringify({
                        type: 'input',
                        data: data,
                        session: sessionId,
                        source: 'web'
                    }));

                    // 根据客户端操作系统类型决定是否本地回显
                    // Windows管道模式: 不会自动回显，需要本地回显
                    // Unix PTY模式: PTY会自动回显，不需要本地回显（避免重复）
                    if (clientOS === 'windows') {
                        // Windows: 立即本地回显
                        terminal.write(data);
                    }
                    // Unix: 不本地回显，等待PTY回显
                }
            });

            // 终端大小变化处理
            terminal.onResize(({ cols, rows }) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'resize',
                        cols: cols,
                        rows: rows,
                        session: sessionId
                    }));
                }
            });
        }

        function connectWebSocket() {
            updateConnectionStatus('connecting');

            // 构建WebSocket URL
            const wsUrl = `${serverUrl}/api/terminal/${sessionId}?type=web&user_id=web-${Date.now()}`;

            // 注意：不在这里显示连接信息，避免闪烁

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    updateConnectionStatus('connected');

                    // 自动隐藏页头和页尾
                    document.body.classList.add('has-connected');
                    document.querySelector('.header').classList.add('hidden');
                    document.querySelector('.footer').classList.add('hidden');

                    // 不在这里发送回车，等待init消息后再发送
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        handleTerminalMessage(msg);
                    } catch (e) {
                        console.error('解析消息失败:', e, event.data);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket错误:', error);
                    updateConnectionStatus('disconnected');
                };

                ws.onclose = (event) => {
                    console.log('WebSocket关闭:', event);
                    updateConnectionStatus('disconnected');

                    // 重新显示页头和页尾
                    document.body.classList.remove('has-connected');
                    document.querySelector('.header').classList.remove('hidden');
                    document.querySelector('.footer').classList.remove('hidden');
                };

            } catch (error) {
                console.error('连接失败:', error);
                updateConnectionStatus('disconnected');
            }
        }

        // 用于跟踪是否收到过缓存消息
        let hasReceivedCachedMessages = false;

        function handleTerminalMessage(msg) {
            // 处理第一个WebSocket消息：清理终端
            if (!hasReceivedFirstMessage) {
                terminal.reset(); // 清空终端
                hasReceivedFirstMessage = true;
                console.log('🧹 已清理终端，开始渲染WebSocket消息');
            }

            switch (msg.type) {
                case 'no_cli':
                    // 没有CLI客户端连接，显示帮助信息
                    terminal.reset(); // 清空终端
                    displayNoCliMessage(msg.data);
                    break;
                case 'init':
                    // 记录客户端操作系统类型（仅用于日志，不显示）
                    clientOS = msg.os_info || 'unknown';
                    console.log('💻 检测到客户端系统:', clientOS);

                    // 不显示任何欢迎信息，只显示纯净的终端内容
                    // 检查是否收到过缓存消息
                    // 如果有缓存消息，说明已经有终端输出（包括提示符），不需要发送回车
                    // 如果没有缓存消息，需要发送回车来触发显示提示符
                    if (!hasReceivedCachedMessages) {
                        // 发送回车符显示提示符（根据系统类型使用正确的换行符）
                        setTimeout(() => {
                            sendEnterKey();
                        }, 500);
                    }
                    break;
                case 'output':
                    if (msg.data && msg.data.length > 0) {
                        // 标记已收到缓存消息
                        hasReceivedCachedMessages = true;
                        terminal.write(msg.data);
                    }
                    break;
                case 'input':
                    // 输入回显（主要用于Windows管道模式下的本地输入）
                    if (msg.data && msg.data.length > 0) {
                        // 只在输入来自本地时回显，避免Web端重复回显
                        if (msg.source === 'local') {
                            terminal.write(msg.data);
                        }
                    }
                    break;
                case 'close':
                    terminal.writeln('');
                    if (msg.data && msg.data.includes('CLI客户端已断开')) {
                        terminal.writeln('\x1b[31m❌ CLI客户端已断开连接\x1b[0m');
                        terminal.writeln('');
                        terminal.writeln('\x1b[33m⚠️  远程终端已关闭\x1b[0m');
                        terminal.writeln('\x1b[36m💡 提示: 请确保CLI客户端正在运行\x1b[0m');
                    } else {
                        terminal.writeln('\x1b[31m❌ 会话已关闭\x1b[0m');
                        if (msg.data) {
                            terminal.writeln(`\x1b[90m${msg.data}\x1b[0m`);
                        }
                    }
                    terminal.writeln('');
                    disconnect();
                    break;
                case 'ping':
                    // 心跳消息，忽略
                    break;
            }
        }

        function sendEnterKey() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            // 根据客户端操作系统类型选择正确的换行符
            let enterKey = '\r'; // 默认使用CR（Unix）
            if (clientOS === 'windows') {
                enterKey = '\r\n'; // Windows使用CRLF
            }

            const enterMsg = {
                type: 'input',
                data: enterKey,
                session: sessionId,
                user_id: 'web'
            };

            ws.send(JSON.stringify(enterMsg));
            console.log(`📤 发送初始回车符 (${clientOS}):`, JSON.stringify(enterKey));
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            updateConnectionStatus('disconnected');
        }

        function displayNoCliMessage(message) {
            // 清空终端并显示友好的帮助信息
            terminal.writeln('\x1b[2J\x1b[H'); // 清屏并移动到首页
            terminal.writeln('');

            // 标题
            terminal.writeln('\x1b[1;33m╔═══════════════════════════════════════════════════════════════╗\x1b[0m');
            terminal.writeln('\x1b[1;33m║\x1b[37m               ⚠️  CLI客户端未连接                              \x1b[33m║\x1b[0m');
            terminal.writeln('\x1b[1;33m╠═══════════════════════════════════════════════════════════════╣\x1b[0m');
            terminal.writeln('\x1b[1;33m║\x1b[0m \x1b[1;37m请先启动CLI客户端，然后再刷新此页面\x1b[0m                        \x1b[1;33m║\x1b[0m');
            terminal.writeln('\x1b[1;33m╚═══════════════════════════════════════════════════════════════╝\x1b[0m');
            terminal.writeln('');

            // 显示消息内容
            if (message) {
                const lines = message.split('\n');
                lines.forEach(line => {
                    if (line.includes('⚠️')) {
                        terminal.writeln(`\x1b[1;33m${line}\x1b[0m`);
                    } else if (line.includes('💡')) {
                        terminal.writeln(`\x1b[1;36m${line}\x1b[0m`);
                    } else if (line.includes('📥')) {
                        terminal.writeln(`\x1b[1;32m${line}\x1b[0m`);
                    } else if (line.includes('./cligool') || line.includes('cligool-')) {
                        // 高亮显示命令示例
                        terminal.writeln(`\x1b[1;32m  ${line}\x1b[0m`);
                    } else if (line.includes('命令') || line.includes('运行')) {
                        terminal.writeln(`\x1b[1;37m${line}\x1b[0m`);
                    } else if (line.includes('http')) {
                        terminal.writeln(`\x1b[1;34m${line}\x1b[0m`);
                    } else if (line.trim() !== '') {
                        terminal.writeln(`  ${line}`);
                    }
                });
            }

            terminal.writeln('');
            terminal.writeln('\x1b[1;36m💡 提示：\x1b[0m');
            terminal.writeln('  1. 复制上面的命令到终端执行');
            terminal.writeln('  2. 或者编辑 ~/.cligool.json 配置文件');
            terminal.writeln('  3. 启动CLI客户端后刷新此页面');
            terminal.writeln('');

            // 添加"复制命令"功能提示
            terminal.writeln('\x1b[1;37m─────────────────────────────────────────────────────────────\x1b[0m');
            terminal.writeln('');

            // 禁用终端输入（因为没有CLI连接）
            terminal.writeln('\x1b[90m等待CLI客户端连接...\x1b[0m');
            terminal.writeln('\x1b[90m(终端已禁用，请启动CLI客户端后刷新页面)\x1b[0m');
            terminal.writeln('');
        }

        function updateConnectionStatus(status) {
            const statusEl = document.getElementById('connection-status');
            const disconnectBtn = document.getElementById('disconnect-btn');

            if (statusEl) {
                statusEl.className = 'status ' + status;

                switch (status) {
                    case 'connected':
                    statusEl.textContent = '已连接';
                    disconnectBtn.style.display = 'block';
                    break;
                case 'connecting':
                    statusEl.textContent = '连接中...';
                    disconnectBtn.style.display = 'none';
                    break;
                case 'disconnected':
                    statusEl.textContent = '未连接';
                    disconnectBtn.style.display = 'none';
                    break;
                }
            }
        }
    </script>
</body>
</html>
