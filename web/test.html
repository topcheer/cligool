<!DOCTYPE html>
<html>
<head>
    <title>xterm.js 测试</title>
    <link rel="stylesheet" href="/lib/xterm.css">
    <style>
        body { padding: 20px; background: #1e1e1e; color: #fff; }
        #terminal { width: 800px; height: 400px; background: #000; }
        .info { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>xterm.js API 测试</h1>
    <div class="info" id="info"></div>
    <div id="terminal"></div>

    <script src="/lib/xterm.js"></script>
    <script src="/lib/xterm-addon-fit.js"></script>
    <script>
        const info = document.getElementById('info');

        // 检查可用的全局对象
        function checkAvailable() {
            let results = [];

            if (typeof Terminal !== 'undefined') {
                results.push('✅ Terminal (全局)');
            } else {
                results.push('❌ Terminal (全局)');
            }

            if (typeof window.Terminal !== 'undefined') {
                results.push('✅ window.Terminal');
            } else {
                results.push('❌ window.Terminal');
            }

            if (typeof xterm !== 'undefined') {
                results.push('✅ xterm 命名空间');
                if (typeof xterm.Terminal !== 'undefined') {
                    results.push('✅ xterm.Terminal');
                } else {
                    results.push('❌ xterm.Terminal');
                }
            } else {
                results.push('❌ xterm 命名空间');
            }

            info.innerHTML = results.join('<br>');
            console.log('可用的全局对象:', results);
        }

        checkAvailable();

        // 创建终端
        try {
            const term = new Terminal({
                cursorBlink: true,
                fontSize: 14,
                theme: {
                    background: '#1e1e1e',
                    foreground: '#d4d4d4'
                }
            });

            term.open(document.getElementById('terminal'));
            term.writeln('✅ 终端创建成功！');
            term.writeln('xterm.js 工作正常');

            info.innerHTML += '<br><br>✅ 终端成功创建！';

        } catch (e) {
            info.innerHTML += '<br><br>❌ 错误: ' + e.message;
            console.error('终端创建失败:', e);
        }
    </script>
</body>
</html>
